name: "Terraform"

on:
  push:
    branches: [ main ]
    paths: [ "terraform/**" ]
  pull_request:
    branches: [ main ]
    paths: [ "terraform/**" ]

# Only allow one workflow run at a time
concurrency:
  group: ${{ github.workflow }}

permissions:
  id-token: write
  pull-requests: write

env:
  TF_LOG: INFO

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::930069301875:role/GithubOIDCTrustPolicy
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - uses: actions/github-script@v8
        if: github.event_name == 'pull_request'
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const marker = '<!-- terraform-plan-comment -->';
            const output = `${marker}
            | Terraform Format and Style | \`${{ steps.fmt.outcome }}\`      |
            | -------------------------- | --------------------------------- |
            | Terraform Initialization   | \`${{ steps.init.outcome }}\`     |
            | Terraform Validation       | \`${{ steps.validate.outcome }}\` |
            | Terraform Plan             | \`${{ steps.plan.outcome }}\`     |

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN_OUTPUT}
            \`\`\`

            </details>

            **Pushed by:** @${{ github.actor }}`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            }

      # Fail the workflow if the plan step failed
      - name: Terraform Plan Status
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ steps.plan.outcome }}" != "success" ]; then
            echo "Terraform plan failed. Failing the workflow."
            exit 1
          fi

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -no-color -input=false
